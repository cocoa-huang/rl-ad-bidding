environment:
  budget: 2900
  num_ticks: 48
  num_episode: 48
  player_index: 0
  max_bid_multiplier: 150.0
  auctionnet_path: ../AuctionNet
  pv_num: 5000
  min_remaining_budget: 0.1
  reward_lambda_cost: 0.1

agent:
  algorithm: iql
  lr: 3e-4
  gamma: 0.99
  batch_size: 32
  n_epochs: 20
  iql_tau: 0.7
  iql_beta: 3.0
  max_advantage_weight: 100.0
  hidden_dims: [256, 256]
  device: auto
  verbose: 1

training:
  total_timesteps: 0
  save_interval: 10

logging:
  use_wandb: false
  project_name: rl-ad-bidding
  run_name: iql_debug