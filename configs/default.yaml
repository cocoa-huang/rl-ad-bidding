environment:
  budget: 2900              # matches AuctionNet player_index=0 default budget
  num_ticks: 48             # AuctionNet ticks per episode
  num_episode: 48           # episodes available in the dataset (cycles 0-47)
  player_index: 0
  max_bid_multiplier: 150.0   # competitors bid cpa * pValues, cpa range is 60-130
  auctionnet_path: ./AuctionNet
  pv_num: 50000
  min_remaining_budget: 0.1
  reward_lambda_cost: 1.0 # Cost penalty coefficient for reward shaping

agent:
  algorithm: ppo
  lr: 3e-4
  gamma: 0.99
  batch_size: 64
  tensorboard_log: "./logs/tensorboard"

training:
  n_episodes: 20000
  eval_interval: 200
  save_interval: 500

logging:
  use_wandb: true
  project_name: rl-ad-bidding
  run_name: baseline
