environment:
  budget: 2900
  num_ticks: 48
  num_episode: 48
  player_index: 0
  max_bid_multiplier: 150.0
  auctionnet_path: ../AuctionNet
  pv_num: 50000
  min_remaining_budget: 0.1
  reward_value_scale: 100.0     # scale conversion value to match cost units (CPA=100 for player 0)
  reward_lambda_cost: 1.0       # profit: penalize cost fully
  reward_alpha_utilization: 0.0 # deprecated
  reward_beta_pacing: 3.0       # pacing: r += beta * min(pacing_ratio, 1.0)

agent:
  algorithm: ppo
  policy: MlpPolicy
  lr: 3e-4
  n_steps: 384
  batch_size: 128
  n_epochs: 10
  gamma: 0.99
  gae_lambda: 0.95
  clip_range: 0.2
  ent_coef: 0.01
  vf_coef: 0.5
  max_grad_norm: 0.5
  total_timesteps: 1000000
  device: cpu

training:
  n_episodes: 1000
  n_envs: 8
  eval_interval: 100
  save_interval: 500
  early_stop_patience: 10

logging:
  use_wandb: true
  project_name: rl-ad-bidding
  entity: sp9019-nyu
  run_name: gcp-run-5
